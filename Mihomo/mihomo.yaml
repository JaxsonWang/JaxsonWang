quic: &quic 'AND,((NETWORK,udp),(DST-PORT,443)),代理QUIC'

rules:
  # 1. 明确特判
  - IP-CIDR,192.168.50.0/24,回家模式,no-resolve
  - RULE-SET,ddns,全球直连

  # 2. 基础直连/保留地址
  - RULE-SET,private,全球直连
  - RULE-SET,private_ip,全球直连,no-resolve

  # 3. 广告
  - RULE-SET,adrules,广告拦截
  - RULE-SET,adrules_ip,广告拦截,no-resolve

  # 4. 业务分类
  - SUB-RULE,(RULE-SET,ai),sub-ai
  - SUB-RULE,(RULE-SET,socialmedia),sub-socialmedia
  - SUB-RULE,(RULE-SET,socialmedia_ip,no-resolve),sub-socialmedia
  - SUB-RULE,(RULE-SET,gits),sub-gits
  - SUB-RULE,(RULE-SET,google),sub-google
  - SUB-RULE,(RULE-SET,google_ip,no-resolve),sub-google
  - SUB-RULE,(RULE-SET,youtube),sub-youtube
  - SUB-RULE,(RULE-SET,youtube_ip,no-resolve),sub-youtube
  - SUB-RULE,(RULE-SET,netflix),sub-netflix
  - SUB-RULE,(RULE-SET,netflix_ip,no-resolve),sub-netflix
  - SUB-RULE,(RULE-SET,spotify),sub-spotify
  - SUB-RULE,(RULE-SET,speedtest),sub-speedtest
  - SUB-RULE,(RULE-SET,spotify_ip,no-resolve),sub-spotify
  - RULE-SET,apple-cn,全球直连
  - SUB-RULE,(RULE-SET,apple),sub-apple
  - SUB-RULE,(RULE-SET,apple_ip,no-resolve),sub-apple
  - SUB-RULE,(RULE-SET,games),sub-games
  - SUB-RULE,(RULE-SET,games_ip,no-resolve),sub-games
  - SUB-RULE,(RULE-SET,cdn),sub-cdn
  # 5. 大类兜底
  - SUB-RULE,(RULE-SET,proxy),sub-proxy
  - SUB-RULE,(RULE-SET,proxy_ip,no-resolve),sub-proxy
  - RULE-SET,cn,全球直连
  - RULE-SET,cn_ip,全球直连,no-resolve
  - *quic
  # 6. 最终兜底
  - MATCH,漏网之鱼

sub-rules:
  sub-ai: [*quic,'MATCH,人工智能']
  sub-socialmedia: [*quic,'MATCH,国外社交']
  sub-gits: [*quic,'MATCH,Gits']
  sub-google: [*quic,'MATCH,Google']
  sub-youtube: [*quic,'MATCH,YouTube']
  sub-netflix: [*quic,'MATCH,Netflix']
  sub-spotify: [*quic,'MATCH,Spotify']
  sub-speedtest: [*quic,'MATCH,Speedtest']
  sub-apple: [*quic,'MATCH,Apple']
  sub-games: [*quic,'MATCH,Games']
  sub-cdn: [*quic,'MATCH,CDN']
  sub-proxy: [*quic,'MATCH,节点选择']
