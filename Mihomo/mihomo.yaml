  - { name: 代理QUIC, type: select, proxies: [PASS-RULE,REJECT], icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Star.png' }

  - { name: 人工智能, <<: *select, icon: 'https://cdn.jsdelivr.net/gh/powerfullz/override-rules@master/icons/chatgpt.png' }
  - { name: Google, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png' }
  - { name: Apple, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png' }
  - { name: 国外社交, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png' }
  - { name: YouTube, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png' }
  - { name: Netflix, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Netflix.png' }
  - { name: Spotify, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png' }
  - { name: Speedtest, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png' }
  - { name: Gits, <<: *select, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png' }
